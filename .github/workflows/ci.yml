name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint and Format
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run pyright

      - name: Test
        run: uv run pytest tests/ -v --tb=short

  publish:
    name: Release to PyPI and MCP Registry
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/mcp-walmart-ads/${{ github.ref_name }}/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv package manager
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build Python package distributions
        run: uv build

      - name: Publish Python package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Install MCP Registry publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Update MCP Registry manifest version
        run: |
          jq --arg version "${GITHUB_REF_NAME}" '.version = $version | .packages[].version = $version' server.json > server.tmp
          mv server.tmp server.json

      - name: Authenticate MCP Registry publisher
        run: ./mcp-publisher login github-oidc

      - name: Publish server metadata to MCP Registry
        run: ./mcp-publisher publish
